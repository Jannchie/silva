name: Publish silva to PyPI

# Publishes the `silva` inference library (packages/silva) to PyPI on GitHub Release.
# Auth is PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time PyPI setup: project "silva-scorer" -> Publishing -> add a GitHub publisher with
#   owner=Jannchie, repo=silva, workflow=publish.yml, environment=pypi
# (use a "pending publisher" on your account's Publishing page until silva-scorer first exists).

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/silva-scorer
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build the silva inference library only
        run: uv build --package silva

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
