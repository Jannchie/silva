name: Publish silva to PyPI

# Publishes the `silva` inference library (packages/silva, distribution `silva-scorer`)
# to PyPI when a version tag is pushed (e.g. `v0.1.0`), or on manual dispatch.
# Auth is PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time PyPI setup: project "silva-scorer" -> Publishing -> add a GitHub publisher with
#   owner=Jannchie, repo=silva, workflow=publish.yml, environment=pypi
# (use a "pending publisher" on your account's Publishing page until silva-scorer first exists).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

env:
  # Run bundled JS actions (checkout, setup-uv) on Node 24 — GitHub deprecates the
  # Node 20 builds they still ship (forced switch June 16 2026). Drop once they default to 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/silva-scorer
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # The published version comes from pyproject.toml, not the tag — fail loudly on a
      # tag that doesn't match so we never ship a different version than the tag implies.
      - name: Check tag matches package version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version' packages/silva/pyproject.toml | cut -d'"' -f2)"
          echo "tag=$tag  pyproject=$pkg"
          test "$tag" = "$pkg"

      - name: Build the silva inference library only
        run: uv build --package silva-scorer

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
