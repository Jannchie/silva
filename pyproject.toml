[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
silva-scorer = { workspace = true }
torch = { index = "pytorch-cu132" }

# CUDA build of torch (driver supports CUDA 13.2 -> cu132). Pinning the index here
# keeps `uv sync` from falling back to the CPU wheel. Applies workspace-wide.
[[tool.uv.index]]
name = "pytorch-cu132"
url = "https://download.pytorch.org/whl/cu132"
explicit = true

[dependency-groups]
# transformers + pillow mirror the silva-scorer[backbone] extra: not runtime deps of
# any workspace package (training runs off precomputed parquet embeddings), but the dev
# env needs them so backbone.py / test_backbone.py resolve and run locally.
dev = ["pytest>=8", "ruff", "transformers>=5.0", "pillow>=10"]

[tool.ruff]
exclude = [".venv", "wandb", "outputs", "scripts/sweep.py"]  # sweep.py: throwaway experiment harness
line-length = 160

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "RUF001", "ANN401", "PGH", "RUF003", "BLE001", "ERA001", "FIX002",
    "TD002", "TD003", "D", "A004", "ANN201", "B008", "FAST002", "INP001",
    "PLR2004", "C901", "PLR0912", "PLR0913", "PLR0915", "N812", "COM812",
    "T201", "TRY003", "EM102", "G004", "FBT001", "FBT002", "FBT003",
]
fixable = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["silva", "silva_train"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]
"**/tests/**" = ["S101", "E402", "F401", "ANN", "PLR2004", "PLC0415", "PD008", "ARG002"]
"scripts/*" = ["PLC0415", "EM101"]

[tool.pytest.ini_options]
testpaths = ["packages/silva/tests", "packages/silva-train/tests"]
addopts = "--import-mode=importlib"
