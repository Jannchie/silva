# SILVA v1 — train the ordinal head on precomputed SigLIP2 embeddings.
model:
  embedding_dim: 1152  # SigLIP2-SO400M pooled feature width
  dropout: 0.3                    # retuned: deep trunk overfits (train 0.94 vs val); 0.3+wd0.05 is the sweet spot (val +0.011)
  hidden_dims: [1024, 512, 256]   # deeper trunk: single-model test Spearman 0.738 (val 0.738)

data:
  manifest_path: data/manifest.parquet
  num_workers: 0   # embeddings live in memory; workers would just copy the DataFrame

train:
  batch_size: 256
  grad_accum: 1
  epochs: 40                 # deeper head needs longer; best calibration at 40 (sweep round 4-5)
  lr_head: 1.5e-3            # retuned for the deeper trunk: 3e-4 under-trained it (val +0.008)
  weight_decay: 0.05         # paired with dropout 0.3 to curb the deep-trunk overfit (wd alone was noise)
  warmup_ratio: 0.03         # scheduler *type* (onecycle/constant) was noise; lr is the lever
  max_grad_norm: 1.0
  use_pos_weight: true       # auto per-threshold class balancing
  ranking_weight: 1.0        # pairwise ranking term: directly optimises Spearman
  soft_spearman_weight: 0.5  # global soft-Spearman term: sharpens ranking + improves calibration (MAE/Pearson)
  qwk_weight: 1.0            # squared-gap penalty: crushes you=4/model=1 blunders — MAE 0.78->0.52, biggap 2.9%->0.7% (round-9 sweep)
  mixed_precision: bf16      # "no" to train on CPU
  report_to: wandb           # needs `wandb login`; set "none" to disable
  project_name: silva
  run_name: null
  eval_every: 1
  early_stop_metric: spearman
  early_stop_patience: 40     # keep all 40 epochs; cosine lr makes the best val land late
  seed: 42
  output_dir: outputs/v1_stage1_head
